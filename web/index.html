<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Murmurarium</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="Murmurarium canvas">
        <canvas id="murmur-canvas"></canvas>
        <div class="readout" aria-live="polite">
          <p class="kicker">Murmurarium</p>
          <h1 id="omen">Listening for impossible weather...</h1>
          <p id="hover-text">Move over a murmur to inspect its tiny opinion.</p>
        </div>
      </section>

      <aside class="controls" aria-label="Terrarium controls">
        <label class="field">
          <span>Seed phrase</span>
          <input id="seed" type="text" value="static radio in a teacup" autocomplete="off">
        </label>

        <div class="control-row">
          <button id="randomize" type="button">Randomize</button>
          <button id="sound" type="button" aria-pressed="false">Sound</button>
          <button id="snapshot" type="button">Snapshot</button>
        </div>

        <label class="range-field">
          <span>Murmurs <strong id="count-value">44</strong></span>
          <input id="count" type="range" min="8" max="96" value="44">
        </label>

        <label class="range-field">
          <span>Gravity <strong id="gravity-value">0.62</strong></span>
          <input id="gravity" type="range" min="0.05" max="1.4" step="0.01" value="0.62">
        </label>

        <dl class="stats">
          <div>
            <dt>Palette</dt>
            <dd id="palette">...</dd>
          </div>
          <div>
            <dt>Pulse</dt>
            <dd id="pulse">...</dd>
          </div>
          <div>
            <dt>Threads</dt>
            <dd id="threads">...</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
